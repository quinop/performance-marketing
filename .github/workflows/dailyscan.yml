name: Daily Marketing Update

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures full history for stable git pushes

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5 for better Node.js compatibility
        with:
          python-version: '3.11' # Upgraded from 3.9 to remove EOL warnings

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt # Use the pinned requirements.txt we just adjusted

      - name: Ensure memory file exists
        run: touch sent_urls.txt # Fixes the "pathspec did not match any files" error

      - name: Run Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python performance_marketing_agent.py

      - name: Commit and Push Memory
        run: |
          git config --global user.name 'Marketing Bot'
          git config --global user.email 'actions@github.com'
          git add sent_urls.txt
          # Only commit and push if there are actual changes to the memory file
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent URLs" && git push)
