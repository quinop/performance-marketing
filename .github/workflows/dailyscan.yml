name: Daily Marketing Update

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser requests google-genai

      - name: Run Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python performance_marketing_agent.py

      - name: Commit and Push Memory
        run: |
          git config --global user.name 'Marketing Bot'
          git config --global user.email 'actions@github.com'
          git add sent_urls.txt || echo "No memory file yet"
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent URLs" && git push)
